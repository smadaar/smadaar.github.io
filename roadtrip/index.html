<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Planner</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, #fff6e7 0%, #ffe7b4 28%, #f8d0a0 55%, #f4c69f 100%);
      background-attachment: fixed;
    }

    .planner {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    header {
      margin-bottom: 32px;
      padding: 30px 28px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255, 236, 179, 0.95), rgba(255, 179, 71, 0.95));
      box-shadow: 0 20px 55px rgba(245, 146, 20, 0.18);
      border: 1px solid rgba(255, 205, 116, 0.35);
    }

    header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #1f2937;
      text-shadow: 0 1px 2px rgba(255,255,255,0.65);
    }

    .home-link {
      display: inline-block;
      margin-top: 6px;
      color: #1f2937;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    header p {
      margin: 0;
      color: #475569;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
    }

    .checkbox-group-label {
      font-weight: 700;
      color: #1f2937;
      margin-right: 6px;
      white-space: nowrap;
    }

    .filter-checkbox {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(245, 158, 11, 0.16);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .filter-checkbox:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 1);
    }

    .filter-checkbox input {
      width: 18px;
      height: 18px;
      accent-color: #f97316;
    }

    .filter-checkbox span {
      color: #1f2937;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .filter-checkbox-label {
      display: inline-flex;
      align-items: center;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      font-size: 0.95rem;
      color: #475569;
      margin-bottom: 12px;
    }

    .day-card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 26px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 18px 42px rgba(250, 183, 75, 0.14);
      border: 1px solid rgba(245, 158, 11, 0.12);
    }

    .day-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin: 0 0 16px;
      flex-wrap: wrap;
    }

    .day-title h2 {
      margin: 0;
      font-size: 1.32rem;
      color: #1f2937;
    }

    .day-title .day-meta {
      color: #64748b;
      font-size: 0.95rem;
    }

    .item-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 14px;
    }

    .item-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 1.6fr minmax(120px, 1fr);
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,248,232,0.95));
      border: 1px solid rgba(251, 191, 36, 0.16);
    }

    .item-row strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.96rem;
    }

    .item-body {
      min-width: 0;
    }

    .item-body p {
      margin: 0;
      color: #334155;
      font-size: 0.96rem;
      line-height: 1.5;
    }

    .travel-total {
      margin: 12px 0 0;
      color: #334155;
      font-size: 1rem;
      opacity: 0.82;
    }

    .item-meta {
      color: #475569;
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      color: #f97316;
      font-weight: 700;
      text-decoration: none;
    }

    .map-link:hover {
      text-decoration: underline;
    }

    .link-group {
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      border: 1px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    .badge.Activity {
      background: rgba(59, 130, 246, 0.12);
      color: #1d4ed8;
      border-color: rgba(59, 130, 246, 0.2);
    }

    .badge.Travel {
      background: rgba(249, 115, 22, 0.15);
      color: #c2410c;
      border-color: rgba(249, 115, 22, 0.2);
    }

    .badge.Hotel {
      background: rgba(234, 179, 8, 0.18);
      color: #b45309;
      border-color: rgba(234, 179, 8, 0.22);
    }

    .empty-state {
      padding: 24px;
      margin-top: 24px;
      background: rgba(248,250,252,0.9);
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: #334155;
      text-align: center;
    }

    @media (max-width: 720px) {
      .planner {
        padding: 18px 12px 40px;
      }

      header {
        padding: 18px 16px;
        border-radius: 18px;
      }

      .day-card {
        padding: 14px;
        border-radius: 14px;
        margin-bottom: 14px;
      }

      .item-row {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
      }

      .item-row strong {
        font-size: 0.92rem;
      }

      .item-body p {
        font-size: 0.9rem;
        line-height: 1.3;
      }

      .item-meta {
        margin-top: 8px;
        font-size: 0.82rem;
        color: #475569;
      }

      .filter-checkbox {
        padding: 8px 10px;
        gap: 8px;
        border-radius: 12px;
      }

      .filter-checkbox input {
        width: 16px;
        height: 16px;
      }

      .filter-checkbox span {
        font-size: 0.88rem;
      }

      .badge {
        padding: 6px 10px;
        font-size: 0.75rem;
      }

      .map-link {
        margin-left: 6px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="planner">
    <header>
      <h1>California Road Trip Planner</h1>
      <p id="travel-total" class="travel-total"></p>
    </header>

    <div class="controls" id="type-filter">
      <span class="checkbox-group-label">Show type</span>
      <label class="filter-checkbox">
        <input type="checkbox" name="type" value="All" checked />
        <span class="filter-checkbox-label">All</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" name="type" value="Activity" />
        <span class="filter-checkbox-label">Activity</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" name="type" value="Travel" />
        <span class="filter-checkbox-label">Travel</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" name="type" value="Hotel" />
        <span class="filter-checkbox-label">Hotel</span>
      </label>
      <label class="filter-checkbox">
        <input type="checkbox" name="type" value="Food" />
        <span class="filter-checkbox-label">Food</span>
      </label>
    </div>

    <section id="planner"></section>
  </main>

  <script src="roadtrip-data.js"></script>
  <script src="roadtrip.js" defer></script>
</body>
</html>
