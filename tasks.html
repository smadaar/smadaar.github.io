<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Task Tracker</title>
  <style>
    :root {
      color-scheme: dark;
      color: #eef2ff;
      background: radial-gradient(circle at top, #3b4f9f, #0a1225 45%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(124, 226, 255, 0.24), transparent 22%),
                  radial-gradient(circle at bottom right, rgba(141, 123, 255, 0.18), transparent 26%),
                  radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.04), transparent 20%),
                  #07111f;
      color: #eef2ff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(135deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      opacity: 0.4;
    }

    main {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 18px 40px;
      z-index: 1;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 28px;
      padding: 26px 24px 26px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    .hero-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.1rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .week-select-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 230px;
    }

    .week-select-wrap label {
      font-size: 0.95rem;
      color: rgba(238, 242, 255, 0.76);
    }

    .week-select {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
      color: #f4f7ff;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 1rem;
      cursor: pointer;
      outline: none;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 180px;
    }

    .bottom-actions {
      display: grid;
      gap: 12px;
      margin: 24px 0 14px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .secondary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #eef2ff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    .secondary-link:hover,
    .secondary-link:focus-visible {
      transform: translateY(-1px);
      background: rgba(124, 226, 255, 0.16);
      outline: none;
    }

    .bottom-actions .btn {
      width: auto;
      min-height: 44px;
      padding: 0.9rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #eef2ff;
      font-size: 1rem;
      border-radius: 999px;
      box-shadow: none;
    }

    .bottom-actions .btn:hover,
    .bottom-actions .btn:focus-visible {
      transform: translateY(-1px);
      background: rgba(124, 226, 255, 0.16);
      outline: none;
    }

    p.lead {
      margin: 0;
      max-width: 680px;
      color: rgba(238, 242, 255, 0.78);
      font-size: 1rem;
      line-height: 1.75;
    }

    .card {
      display: grid;
      gap: 18px;
      padding: 22px;
      margin-bottom: 20px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }

    .top-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .label-group {
      min-width: 0;
      flex: 1;
      width: 100%;
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .task-meta {
      margin: 0;
      color: rgba(238, 242, 255, 0.70);
      font-size: 0.96rem;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: nowrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #f8fbff;
      font-size: 1.45rem;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      background: rgba(124, 226, 255, 0.18);
      outline: none;
    }

    .count {
      min-width: 90px;
      font-weight: 700;
      text-align: center;
      color: #fff;
      font-size: 1rem;
    }

    .progress {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(124, 226, 255, 0.95), rgba(141, 123, 255, 0.9));
      transition: width 0.25s ease, background 0.25s ease;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .day-column.current-day {
      background: rgba(124, 226, 255, 0.15);
      border: 1px solid rgba(124, 226, 255, 0.3);
      box-shadow: 0 0 12px rgba(124, 226, 255, 0.2);
    }

    .day-column.current-day .day-label {
      color: rgba(124, 226, 255, 0.9);
      font-weight: 700;
    }

    .day-label {
      font-size: 0.85rem;
      color: rgba(238, 242, 255, 0.7);
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .day-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .day-count {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      min-height: 1.2em;
    }

    .day-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: #f8fbff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-btn:hover,
    .day-btn:focus-visible {
      transform: translateY(-1px);
      background: rgba(124, 226, 255, 0.2);
      outline: none;
    }

    .hint {
      font-size: 0.95rem;
      color: rgba(238, 242, 255, 0.65);
      margin: 0;
    }

    .footer {
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: rgba(238, 242, 255, 0.72);
      font-size: 0.95rem;
    }

    @media (max-width: 540px) {
      main {
        padding: 20px 16px 32px;
      }

      .hero-header {
        align-items: stretch;
      }

      .days-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .day-column {
        padding: 6px;
      }

      .day-label {
        font-size: 0.7rem;
        margin-bottom: 2px;
      }

      .day-count {
        font-size: 0.75rem;
      }

      .day-btn {
        width: 22px;
        height: 22px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 640px) {
      .bottom-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-header">
        <div>
          <h1>Weekly task tracker</h1>
        </div>
        <div class="week-select-wrap">
          <label for="weekPicker">Select week</label>
          <select id="weekPicker" class="week-select"></select>
        </div>
      </div>
      <div id="completionStatus" style="text-align: center; font-size: 1rem; color: rgba(238, 242, 255, 0.78);">
        <strong id="tasksCompleted">0</strong> of <strong id="tasksTotal">0</strong> tasks complete
      </div>
    </section>

    <p id="statusMessage" class="hint"></p>
    <div id="taskContainer"></div>

    <div class="bottom-actions">
      <a class="secondary-link" href="edit-tasks.html">Edit tasks</a>
      <button id="resetProgress" class="btn">Reset today</button>
      <button id="exportData" class="btn">Export data</button>
      <button id="importData" class="btn">Import data</button>
      <button id="clearStorage" class="btn">Clear all data</button>
      <input id="importFile" type="file" accept="application/json" hidden>
    </div>

    <aside class="footer">
      Your progress is saved in your browser automatically per selected week. Reloading restores your current counts for the week in focus.
    </aside>

    <div class="week-select-wrap" style="margin-top: 20px;">
      <label for="debugDatePicker">Debug date (leave empty for today)</label>
      <input id="debugDatePicker" type="date" class="week-select" style="font-family: monospace;">
    </div>
  </main>

  <script>
    const storageKey = 'weeklyTaskTrackerCounts';
    const taskDefKey = 'weeklyTaskDefinitions';
    const selectedWeekKey = 'weeklyTaskTrackerSelectedWeek';
    const debugDateKey = 'weeklyTaskTrackerDebugDate';
    const weekPicker = document.getElementById('weekPicker');
    const taskContainer = document.getElementById('taskContainer');
    const debugDatePicker = document.getElementById('debugDatePicker');

    // Get today's date, respecting any debug date override
    function getToday() {
      const override = localStorage.getItem(debugDateKey);
      if (override) {
        const date = new Date(override + 'T00:00:00');
        return date;
      }
      return new Date();
    }

    const defaultTasks = [
      {
        id: 'steps',
        title: 'Walk 100k steps',
        unitLabel: 'steps',
        target: 100000,
        type: 'min',
        step: 1000,
        bonusAlcohol: 1
      },
      {
        id: 'exercise',
        title: 'Exercise 240 mins',
        unitLabel: 'mins',
        target: 240,
        type: 'min',
        step: 30,
        bonusAlcohol: 3
      },
      {
        id: 'water',
        title: 'Drink 4 pints water per day',
        unitLabel: 'pints',
        target: 4,
        type: 'min',
        step: 1,
        daily: true
      },
      {
        id: 'fruit',
        title: 'Eat 25 pieces of fruit',
        unitLabel: 'fruit',
        target: 25,
        type: 'min',
        step: 1
      },
      {
        id: 'alcohol',
        title: 'Drink no more than 20 alcohol units',
        unitLabel: 'units',
        target: 20,
        type: 'max',
        step: 1
      },
      {
        id: 'alcoholFreeDays',
        title: 'Have 5 alcohol free days',
        unitLabel: 'days',
        target: 5,
        type: 'min',
        step: 1
      },
      {
        id: 'beans',
        title: 'Eat 6 Bn',
        unitLabel: 'beans',
        target: 6,
        type: 'min',
        step: 1
      },
      {
        id: 'bread',
        title: 'Eat no more than 4 bread',
        unitLabel: 'slices',
        target: 4,
        type: 'max',
        step: 1
      }
    ];

    function slugify(text) {
      return String(text)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '')
        .substring(0, 35);
    }

    function getStoredTasks() {
      const raw = localStorage.getItem(taskDefKey);
      if (!raw) {
        localStorage.setItem(taskDefKey, JSON.stringify(defaultTasks));
        return defaultTasks.slice();
      }

      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length === 0) {
          throw new Error('Invalid task definitions');
        }

        return parsed.map(task => ({
          id: task.id || slugify(task.title) || `task-${Date.now()}`,
          title: String(task.title || ''),
          unitLabel: String(task.unitLabel || ''),
          target: Number.isFinite(Number(task.target)) ? Number(task.target) : 0,
          type: task.type === 'max' ? 'max' : 'min',
          step: Number.isFinite(Number(task.step)) ? Number(task.step) : (task.id === 'steps' ? 1000 : 1),
          bonusAlcohol: Number.isFinite(Number(task.bonusAlcohol)) ? Number(task.bonusAlcohol) : 0,
          daily: Boolean(task.daily)
        }));
      } catch (err) {
        localStorage.setItem(taskDefKey, JSON.stringify(defaultTasks));
        return defaultTasks.slice();
      }
    }

    function startOfWeek(date) {
      const copy = new Date(date);
      const day = copy.getDay();
      const diff = (day + 6) % 7;
      copy.setDate(copy.getDate() - diff);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function formatWeekRange(startDate) {
      const options = { month: 'short', day: 'numeric' };
      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 6);
      return `${startDate.toLocaleDateString('en-US', options)} – ${endDate.toLocaleDateString('en-US', options)}`;
    }

    function getWeekKey(startDate) {
      return `${startDate.getFullYear()}-${String(startDate.getMonth() + 1).padStart(2, '0')}-${String(startDate.getDate()).padStart(2, '0')}`;
    }

    function generateWeekOptions() {
      const weeks = [];
      const start = startOfWeek(getToday());
      const sixWeeksAgo = new Date(start);
      sixWeeksAgo.setDate(start.getDate() - 42);
      for (let i = 0; i < 13; i++) {
        const weekStart = new Date(sixWeeksAgo);
        weekStart.setDate(sixWeeksAgo.getDate() + i * 7);
        weeks.push(weekStart);
      }
      return weeks;
    }

    function getPersistedData() {
      return JSON.parse(localStorage.getItem(storageKey) || '{}');
    }

    function setPersistedData(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function getDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function getWeekDayCounts(weekKey, dayKey) {
      const storage = getPersistedData();
      return (storage[weekKey] && storage[weekKey][dayKey]) || {};
    }

    function setWeekDayCount(weekKey, dayKey, taskId, value) {
      const storage = getPersistedData();
      storage[weekKey] = storage[weekKey] || {};
      storage[weekKey][dayKey] = storage[weekKey][dayKey] || {};
      storage[weekKey][dayKey][taskId] = value;
      setPersistedData(storage);
    }

    function showStatusMessage(message) {
      const statusMessage = document.getElementById('statusMessage');
      if (statusMessage) {
        statusMessage.textContent = message;
        setTimeout(() => {
          statusMessage.textContent = '';
        }, 2500);
      }
    }

    function resetCurrentDay() {
      const weekKey = weekPicker.value;
      const todayKey = getDateKey(getToday());
      const storage = getPersistedData();
      if (storage[weekKey] && storage[weekKey][todayKey]) {
        storage[weekKey][todayKey] = {};
        setPersistedData(storage);
      }
      renderTasksForWeek(weekKey);
      showStatusMessage('Today\'s progress was reset to 0.');
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function createTaskCard(task, weekKey) {
      const todayKey = getDateKey(getToday());
      const storage = getPersistedData();
      
      // For daily tasks, show today's count. For weekly tasks, sum the entire week.
      let initialValue = 0;
      if (task.daily) {
        const counts = getWeekDayCounts(weekKey, todayKey);
        initialValue = typeof counts[task.id] === 'number' ? counts[task.id] : 0;
      } else {
        // Sum all days in the week for this task
        if (storage[weekKey]) {
          for (const dayKey in storage[weekKey]) {
            const dayCount = storage[weekKey][dayKey][task.id];
            if (typeof dayCount === 'number') {
              initialValue += dayCount;
            }
          }
        }
      }
      const card = document.createElement('article');
      card.className = 'card';
      
      // Get week start date
      const weekStart = new Date(weekKey + 'T00:00:00');
      const days = [];
      for (let i = 0; i < 7; i++) {
        const dayDate = new Date(weekStart);
        dayDate.setDate(weekStart.getDate() + i);
        days.push({
          date: dayDate,
          key: getDateKey(dayDate),
          label: dayDate.toLocaleDateString('en-US', { weekday: 'short' }).substring(0, 2)
        });
      }
      
      card.innerHTML = `
        <div class="top-row">
          <div class="label-group">
            <h2 class="task-title">${task.title}</h2>
          </div>
        </div>
        <div class="days-grid">
          ${days.map(day => `
            <div class="day-column${day.key === getDateKey(getToday()) ? ' current-day' : ''}" data-day="${day.key}">
              <div class="day-label">${day.label}</div>
              <div class="day-controls">
                <button class="day-btn increase" data-day="${day.key}" aria-label="Increase ${task.unitLabel} for ${day.label}">+</button>
                <div class="day-count" data-day="${day.key}" aria-live="polite">0</div>
                <button class="day-btn decrease" data-day="${day.key}" aria-label="Decrease ${task.unitLabel} for ${day.label}">−</button>
              </div>
            </div>
          `).join('')}
        </div>
        ${!task.daily ? `
        <div class="progress" aria-hidden="true">
          <div class="progress-bar" style="width: 0%"></div>
        </div>
        ` : ''}
        <div class="status">
          <span class="tag detail"></span>
        </div>
      `;

      const progressBar = task.daily ? null : card.querySelector('.progress-bar');
      const detailLabel = card.querySelector('.detail');

      function getBonusAlcohol() {
        if (task.id !== 'alcohol') return 0;
        const allTasks = getStoredTasks();
        const storage = getPersistedData();
        
        return allTasks.reduce((bonus, sourceTask) => {
          if (!sourceTask.bonusAlcohol || sourceTask.id === 'alcohol') {
            return bonus;
          }
          
          let sourceCount = 0;
          if (sourceTask.daily) {
            const todayKey = getDateKey(getToday());
            const counts = getWeekDayCounts(weekKey, todayKey);
            sourceCount = counts[sourceTask.id] || 0;
          } else {
            // Sum across the week for non-daily tasks
            if (storage[weekKey]) {
              for (const dayKey in storage[weekKey]) {
                const dayCount = storage[weekKey][dayKey][sourceTask.id];
                if (typeof dayCount === 'number') {
                  sourceCount += dayCount;
                }
              }
            }
          }
          
          const extra = Math.max(0, sourceCount - sourceTask.target);
          const increments = Math.floor(extra / sourceTask.step);
          return bonus + increments * sourceTask.bonusAlcohol;
        }, 0);
      }

      function getWeeklyTotal() {
        const storage = getPersistedData();
        let total = 0;
        if (storage[weekKey]) {
          for (const dayKey in storage[weekKey]) {
            const dayCount = storage[weekKey][dayKey][task.id];
            if (typeof dayCount === 'number') {
              total += dayCount;
            }
          }
        }
        return total;
      }

      function renderCard() {
        const weeklyTotal = getWeeklyTotal();
        const effectiveTarget = task.id === 'alcohol' ? task.target + getBonusAlcohol() : task.target;
        const progress = task.type === 'min'
          ? clamp((weeklyTotal / task.target) * 100, 0, 100)
          : clamp((1 - weeklyTotal / effectiveTarget) * 100, 0, 100);

        if (!task.daily) {
          progressBar.style.width = `${progress}%`;
        }

        // Update each day's count
        days.forEach(day => {
          const counts = getWeekDayCounts(weekKey, day.key);
          const dayValue = typeof counts[task.id] === 'number' ? counts[task.id] : 0;
          const countElement = card.querySelector(`.day-count[data-day="${day.key}"]`);
          if (countElement) {
            countElement.textContent = `${dayValue}`;
          }
        });

        if (task.type === 'min') {
          detailLabel.textContent = weeklyTotal >= task.target
            ? ''
            : `${task.target - weeklyTotal} ${task.unitLabel} to go`;
        } else {
          detailLabel.textContent = weeklyTotal <= effectiveTarget
            ? `${effectiveTarget - weeklyTotal} ${task.unitLabel} remaining${task.id === 'alcohol' && effectiveTarget > task.target ? ` (${effectiveTarget - task.target} bonus units)` : ''}`
            : `${weeklyTotal - effectiveTarget} over the limit`;
        }

        if (!task.daily && task.type === 'max' && weeklyTotal > effectiveTarget) {
          progressBar.style.background = 'linear-gradient(90deg, rgba(255,136,136,0.95), rgba(255,96,96,0.95))';
        } else if (!task.daily) {
          progressBar.style.background = 'linear-gradient(90deg, rgba(124,226,255,0.95), rgba(141,123,255,0.9))';
        }
      }

      function updateDayCount(dayKey, value) {
        const safeValue = clamp(value, 0, task.type === 'min' ? Math.max(task.target, value) : Math.max(task.target, value));
        setWeekDayCount(weekKey, dayKey, task.id, safeValue);
        renderCard();
        updateCompletionStatus(weekKey, getStoredTasks());
      }

      // Add event listeners for all day buttons
      days.forEach(day => {
        const increaseBtn = card.querySelector(`.day-btn.increase[data-day="${day.key}"]`);
        const decreaseBtn = card.querySelector(`.day-btn.decrease[data-day="${day.key}"]`);

        increaseBtn.addEventListener('click', () => {
          const current = typeof getWeekDayCounts(weekKey, day.key)[task.id] === 'number' ? getWeekDayCounts(weekKey, day.key)[task.id] : 0;
          updateDayCount(day.key, current + task.step);
        });

        decreaseBtn.addEventListener('click', () => {
          const current = typeof getWeekDayCounts(weekKey, day.key)[task.id] === 'number' ? getWeekDayCounts(weekKey, day.key)[task.id] : 0;
          updateDayCount(day.key, current - task.step);
        });
      });

      renderCard();
      return card;
    }

    function renderTasksForWeek(weekKey) {
      taskContainer.innerHTML = '';
      const tasks = getStoredTasks();
      tasks.forEach(task => taskContainer.appendChild(createTaskCard(task, weekKey)));
      
      // Update completion status
      updateCompletionStatus(weekKey, tasks);
    }

    function updateCompletionStatus(weekKey, tasks) {
      const storage = getPersistedData();
      let completed = 0;
      
      tasks.forEach(task => {
        let taskValue = 0;
        if (task.daily) {
          const todayKey = getDateKey(getToday());
          const counts = getWeekDayCounts(weekKey, todayKey);
          taskValue = typeof counts[task.id] === 'number' ? counts[task.id] : 0;
        } else {
          // Sum all days in the week for this task
          if (storage[weekKey]) {
            for (const dayKey in storage[weekKey]) {
              const dayCount = storage[weekKey][dayKey][task.id];
              if (typeof dayCount === 'number') {
                taskValue += dayCount;
              }
            }
          }
        }
        
        // Check if task is complete
        let isComplete = false;
        if (task.id === 'alcohol') {
          // For alcohol, calculate bonus first
          let bonusAlcohol = 0;
          tasks.forEach(sourceTask => {
            if (!sourceTask.bonusAlcohol || sourceTask.id === 'alcohol') {
              return;
            }
            
            let sourceCount = 0;
            if (sourceTask.daily) {
              const todayKey = getDateKey(getToday());
              const counts = getWeekDayCounts(weekKey, todayKey);
              sourceCount = counts[sourceTask.id] || 0;
            } else {
              if (storage[weekKey]) {
                for (const dayKey in storage[weekKey]) {
                  const dayCount = storage[weekKey][dayKey][sourceTask.id];
                  if (typeof dayCount === 'number') {
                    sourceCount += dayCount;
                  }
                }
              }
            }
            
            const extra = Math.max(0, sourceCount - sourceTask.target);
            const increments = Math.floor(extra / sourceTask.step);
            bonusAlcohol += increments * sourceTask.bonusAlcohol;
          });
          isComplete = taskValue <= task.target + bonusAlcohol;
        } else if (task.type === 'min') {
          isComplete = taskValue >= task.target;
        } else {
          isComplete = taskValue <= task.target;
        }
        
        if (isComplete) completed++;
      });
      
      document.getElementById('tasksCompleted').textContent = completed;
      document.getElementById('tasksTotal').textContent = tasks.length;
    }

    function buildWeekPicker() {
      const weekStarts = generateWeekOptions();
      weekStarts.forEach((weekStart, index) => {
        const option = document.createElement('option');
        const weekKey = getWeekKey(weekStart);
        option.value = weekKey;
        option.textContent = `Week ${index + 1}: ${formatWeekRange(weekStart)}`;
        weekPicker.append(option);
      });

      const storedWeek = localStorage.getItem(selectedWeekKey);
      const todayStart = startOfWeek(getToday());
      const defaultWeekKey = storedWeek || getWeekKey(todayStart);
      weekPicker.value = defaultWeekKey;
      renderTasksForWeek(weekPicker.value);
    }

    weekPicker.addEventListener('change', () => {
      const selectedWeek = weekPicker.value;
      localStorage.setItem(selectedWeekKey, selectedWeek);
      renderTasksForWeek(selectedWeek);
    });

    const resetButton = document.getElementById('resetProgress');
    const exportButton = document.getElementById('exportData');
    const importButton = document.getElementById('importData');
    const importFile = document.getElementById('importFile');

    function exportAllData() {
      const exportObject = {
        taskDefinitions: getStoredTasks(),
        progress: getPersistedData(),
        selectedWeek: localStorage.getItem(selectedWeekKey) || null
      };
      const blob = new Blob([JSON.stringify(exportObject, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'weekly-task-tracker-data.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showStatusMessage('Data exported to JSON file.');
    }

    function importAllData(file) {
      const reader = new FileReader();
      reader.onload = event => {
        try {
          const imported = JSON.parse(event.target.result);
          if (imported) {
            if (Array.isArray(imported.taskDefinitions)) {
              localStorage.setItem(taskDefKey, JSON.stringify(imported.taskDefinitions));
            }
            if (imported.progress && typeof imported.progress === 'object') {
              localStorage.setItem(storageKey, JSON.stringify(imported.progress));
            }
            if (typeof imported.selectedWeek === 'string') {
              localStorage.setItem(selectedWeekKey, imported.selectedWeek);
            }
            renderTasksForWeek(weekPicker.value);
            showStatusMessage('Data imported successfully.');
          }
        } catch (err) {
          showStatusMessage('Could not import data: invalid JSON.');
        }
      };
      reader.readAsText(file);
    }

    const clearButton = document.getElementById('clearStorage');

    if (resetButton) {
      resetButton.addEventListener('click', resetCurrentDay);
    }
    if (exportButton) {
      exportButton.addEventListener('click', exportAllData);
    }
    if (importButton && importFile) {
      importButton.addEventListener('click', () => importFile.click());
      importFile.addEventListener('change', event => {
        const file = event.target.files[0];
        if (file) {
          importAllData(file);
        }
        importFile.value = '';
      });
    }
    if (clearButton) {
      clearButton.addEventListener('click', () => {
        const confirmed = window.confirm('Delete all locally saved task data? This cannot be undone.');
        if (!confirmed) return;
        localStorage.clear();
        showStatusMessage('All local data cleared. Reloading page...');
        setTimeout(() => window.location.reload(), 500);
      });
    }

    // Debug date picker functionality
    if (debugDatePicker) {
      // Load stored debug date if exists
      const storedDebugDate = localStorage.getItem(debugDateKey);
      if (storedDebugDate) {
        debugDatePicker.value = storedDebugDate;
      }

      debugDatePicker.addEventListener('change', () => {
        if (debugDatePicker.value) {
          localStorage.setItem(debugDateKey, debugDatePicker.value);
          showStatusMessage(`Debug date set to ${debugDatePicker.value}. Reloading...`);
        } else {
          localStorage.removeItem(debugDateKey);
          debugDatePicker.value = '';
          showStatusMessage('Debug date cleared. Using today\'s date. Reloading...');
        }
        setTimeout(() => window.location.reload(), 500);
      });
    }

    buildWeekPicker();
  </script>
</body>
</html>
