<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Planner</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #ffffff, #e5effc 60%);
    }

    .planner {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    header {
      margin-bottom: 32px;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 18px 45px rgba(31,41,55,0.08);
    }

    header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1.05;
    }

    header p {
      margin: 0;
      color: #475569;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
    }

    .controls label,
    .controls input,
    .controls select {
      font: inherit;
    }

    .controls input,
    .controls select {
      min-width: 180px;
      padding: 11px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #ffffff;
      color: #1f2937;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      font-size: 0.95rem;
      color: #475569;
      margin-bottom: 12px;
    }

    .day-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(148,163,184,0.18);
    }

    .day-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin: 0 0 16px;
      flex-wrap: wrap;
    }

    .day-title h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .day-title .day-meta {
      color: #64748b;
      font-size: 0.95rem;
    }

    .item-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .item-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 1.6fr minmax(120px, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid rgba(148,163,184,0.16);
    }

    .item-row strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.96rem;
    }

    .item-body {
      min-width: 0;
    }

    .item-body p {
      margin: 0;
      color: #334155;
      font-size: 0.96rem;
      line-height: 1.5;
    }

    .item-meta {
      color: #475569;
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .badge.Activity {
      background: rgba(59,130,246,0.12);
      color: #1d4ed8;
    }

    .badge.Travel {
      background: rgba(16,185,129,0.12);
      color: #047857;
    }

    .badge.Hotel {
      background: rgba(234,179,8,0.14);
      color: #92400e;
    }

    .empty-state {
      padding: 24px;
      margin-top: 24px;
      background: rgba(248,250,252,0.9);
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      color: #334155;
      text-align: center;
    }

    @media (max-width: 720px) {
      .item-row {
        grid-template-columns: 1fr;
      }

      .item-meta {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="planner">
    <header>
      <h1>California Road Trip Planner</h1>
    </header>

    <div class="controls">
      <label for="type-filter">Filter by type</label>
      <select id="type-filter" aria-label="Filter itinerary items by type">
        <option value="">All</option>
        <option value="Activity">Activity</option>
        <option value="Travel">Travel</option>
        <option value="Hotel">Hotel</option>
      </select>
    </div>

    <section id="planner"></section>
  </main>

  <script src="roadtrip-data.js"></script>
  <script src="roadtrip.js" defer></script>
</body>
</html>
