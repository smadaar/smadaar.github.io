<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Task Tracker</title>
  <style>
    :root {
      color-scheme: dark;
      color: #eef2ff;
      background: radial-gradient(circle at top, #3b4f9f, #0a1225 45%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(124, 226, 255, 0.24), transparent 22%),
                  radial-gradient(circle at bottom right, rgba(141, 123, 255, 0.18), transparent 26%),
                  radial-gradient(circle at 50% 120%, rgba(255, 255, 255, 0.04), transparent 20%),
                  #07111f;
      color: #eef2ff;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(135deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,0) 100%);
      pointer-events: none;
      opacity: 0.4;
    }

    main {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 18px 40px;
      z-index: 1;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 28px;
      padding: 26px 24px 26px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    .hero-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.1rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .week-select-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 230px;
    }

    .week-select-wrap label {
      font-size: 0.95rem;
      color: rgba(238, 242, 255, 0.76);
    }

    .week-select {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
      color: #f4f7ff;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 1rem;
      cursor: pointer;
      outline: none;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 180px;
    }

    .bottom-actions {
      display: grid;
      gap: 12px;
      margin: 24px 0 14px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }

    .secondary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #eef2ff;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    .secondary-link:hover,
    .secondary-link:focus-visible {
      transform: translateY(-1px);
      background: rgba(124, 226, 255, 0.16);
      outline: none;
    }

    .bottom-actions .btn {
      width: auto;
      min-height: 44px;
      padding: 0.9rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #eef2ff;
      font-size: 1rem;
      border-radius: 999px;
      box-shadow: none;
    }

    .bottom-actions .btn:hover,
    .bottom-actions .btn:focus-visible {
      transform: translateY(-1px);
      background: rgba(124, 226, 255, 0.16);
      outline: none;
    }

    p.lead {
      margin: 0;
      max-width: 680px;
      color: rgba(238, 242, 255, 0.78);
      font-size: 1rem;
      line-height: 1.75;
    }

    .card {
      display: grid;
      gap: 18px;
      padding: 22px;
      margin-bottom: 20px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      flex-wrap: wrap;
    }

    .label-group {
      min-width: 0;
      flex: 1;
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .task-meta {
      margin: 0;
      color: rgba(238, 242, 255, 0.70);
      font-size: 0.96rem;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #f8fbff;
      font-size: 1.45rem;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      background: rgba(124, 226, 255, 0.18);
      outline: none;
    }

    .count {
      min-width: 90px;
      font-weight: 700;
      text-align: center;
      color: #fff;
      font-size: 1rem;
    }

    .progress {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(124, 226, 255, 0.95), rgba(141, 123, 255, 0.9));
      transition: width 0.25s ease, background 0.25s ease;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: rgba(238, 242, 255, 0.76);
      font-size: 0.96rem;
      margin: 0;
      flex-wrap: wrap;
    }

    .status .tag {
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.06);
    }

    .hint {
      font-size: 0.95rem;
      color: rgba(238, 242, 255, 0.65);
      margin: 0;
    }

    .footer {
      margin-top: 16px;
      padding: 16px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: rgba(238, 242, 255, 0.72);
      font-size: 0.95rem;
    }

    @media (max-width: 540px) {
      main {
        padding: 20px 16px 32px;
      }

      .hero-header {
        align-items: stretch;
      }

      .controls {
        width: 100%;
        justify-content: space-between;
      }

      .count {
        width: 100%;
        min-width: auto;
      }
    }

    @media (max-width: 640px) {
      .bottom-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-header">
        <div>
          <h1>Weekly task tracker</h1>
        </div>
        <div class="week-select-wrap">
          <label for="weekPicker">Select week</label>
          <select id="weekPicker" class="week-select"></select>
        </div>
      </div>
    </section>

    <p id="statusMessage" class="hint"></p>
    <div id="taskContainer"></div>

    <div class="bottom-actions">
      <a class="secondary-link" href="edit-tasks.html">Edit tasks</a>
      <button id="resetProgress" class="btn">Reset today</button>
      <button id="exportData" class="btn">Export data</button>
      <button id="importData" class="btn">Import data</button>
      <button id="clearStorage" class="btn">Clear all data</button>
      <input id="importFile" type="file" accept="application/json" hidden>
    </div>

    <aside class="footer">
      Your progress is saved in your browser automatically per selected week. Reloading restores your current counts for the week in focus.
    </aside>
  </main>

  <script>
    const storageKey = 'weeklyTaskTrackerCounts';
    const taskDefKey = 'weeklyTaskDefinitions';
    const selectedWeekKey = 'weeklyTaskTrackerSelectedWeek';
    const weekPicker = document.getElementById('weekPicker');
    const taskContainer = document.getElementById('taskContainer');

    const defaultTasks = [
      {
        id: 'steps',
        title: 'Walk at least 100,000 steps',
        unitLabel: 'steps',
        target: 100000,
        type: 'min',
        step: 1000,
        bonusAlcohol: 1
      },
      {
        id: 'exercise',
        title: 'Exercise at least 240 mins',
        unitLabel: 'mins',
        target: 240,
        type: 'min',
        step: 30,
        bonusAlcohol: 3
      },
      {
        id: 'water',
        title: 'Drink at least 4 pints of water per day',
        unitLabel: 'pints',
        target: 4,
        type: 'min',
        step: 1,
        daily: true
      },
      {
        id: 'fruit',
        title: 'Eat at least 25 pieces of fruit',
        unitLabel: 'fruit',
        target: 25,
        type: 'min',
        step: 1
      },
      {
        id: 'alcohol',
        title: 'Drink no more than 25 alcohol units',
        unitLabel: 'units',
        target: 25,
        type: 'max',
        step: 1
      }
    ];

    function slugify(text) {
      return String(text)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '')
        .substring(0, 35);
    }

    function getStoredTasks() {
      const raw = localStorage.getItem(taskDefKey);
      if (!raw) {
        localStorage.setItem(taskDefKey, JSON.stringify(defaultTasks));
        return defaultTasks.slice();
      }

      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length === 0) {
          throw new Error('Invalid task definitions');
        }

        return parsed.map(task => ({
          id: task.id || slugify(task.title) || `task-${Date.now()}`,
          title: String(task.title || ''),
          unitLabel: String(task.unitLabel || ''),
          target: Number.isFinite(Number(task.target)) ? Number(task.target) : 0,
          type: task.type === 'max' ? 'max' : 'min',
          step: Number.isFinite(Number(task.step)) ? Number(task.step) : (task.id === 'steps' ? 1000 : 1),
          bonusAlcohol: Number.isFinite(Number(task.bonusAlcohol)) ? Number(task.bonusAlcohol) : 0,
          daily: Boolean(task.daily)
        }));
      } catch (err) {
        localStorage.setItem(taskDefKey, JSON.stringify(defaultTasks));
        return defaultTasks.slice();
      }
    }

    function startOfWeek(date) {
      const copy = new Date(date);
      const day = copy.getDay();
      const diff = (day + 6) % 7;
      copy.setDate(copy.getDate() - diff);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function formatWeekRange(startDate) {
      const options = { month: 'short', day: 'numeric' };
      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 6);
      return `${startDate.toLocaleDateString('en-US', options)} – ${endDate.toLocaleDateString('en-US', options)}`;
    }

    function getWeekKey(startDate) {
      return `${startDate.getFullYear()}-${String(startDate.getMonth() + 1).padStart(2, '0')}-${String(startDate.getDate()).padStart(2, '0')}`;
    }

    function generateWeekOptions() {
      const weeks = [];
      const start = new Date(2026, 2, 30);
      for (let i = 0; i < 12; i++) {
        const weekStart = new Date(start);
        weekStart.setDate(start.getDate() + i * 7);
        weeks.push(weekStart);
      }
      return weeks;
    }

    function getPersistedData() {
      return JSON.parse(localStorage.getItem(storageKey) || '{}');
    }

    function setPersistedData(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function getDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function getWeekDayCounts(weekKey, dayKey) {
      const storage = getPersistedData();
      return (storage[weekKey] && storage[weekKey][dayKey]) || {};
    }

    function setWeekDayCount(weekKey, dayKey, taskId, value) {
      const storage = getPersistedData();
      storage[weekKey] = storage[weekKey] || {};
      storage[weekKey][dayKey] = storage[weekKey][dayKey] || {};
      storage[weekKey][dayKey][taskId] = value;
      setPersistedData(storage);
    }

    function showStatusMessage(message) {
      const statusMessage = document.getElementById('statusMessage');
      if (statusMessage) {
        statusMessage.textContent = message;
        setTimeout(() => {
          statusMessage.textContent = '';
        }, 2500);
      }
    }

    function resetCurrentDay() {
      const weekKey = weekPicker.value;
      const todayKey = getDateKey(new Date());
      const storage = getPersistedData();
      if (storage[weekKey] && storage[weekKey][todayKey]) {
        storage[weekKey][todayKey] = {};
        setPersistedData(storage);
      }
      renderTasksForWeek(weekKey);
      showStatusMessage('Today\'s progress was reset to 0.');
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function createTaskCard(task, weekKey) {
      const todayKey = getDateKey(new Date());
      const counts = getWeekDayCounts(weekKey, todayKey);
      const initialValue = typeof counts[task.id] === 'number' ? counts[task.id] : 0;
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div class="top-row">
          <div class="label-group">
            <h2 class="task-title">${task.title}</h2>
            <p class="task-meta">${task.daily ? 'Daily target:' : 'Target:'} ${task.type === 'min' ? `at least ${task.target}` : `at most ${task.target}`} ${task.unitLabel}${task.daily ? ' (per day)' : ''}</p>
          </div>
          <div class="controls" aria-label="Adjust ${task.title}">
            <button class="btn decrease" aria-label="Decrease ${task.unitLabel}">−</button>
            <div class="count" aria-live="polite">${initialValue} ${task.unitLabel}</div>
            <button class="btn increase" aria-label="Increase ${task.unitLabel}">+</button>
          </div>
        </div>
        <div class="progress" aria-hidden="true">
          <div class="progress-bar" style="width: 0%"></div>
        </div>
        <div class="status">
          <span class="tag current"></span>
          <span class="tag detail"></span>
        </div>
      `;

      const decreaseButton = card.querySelector('.decrease');
      const increaseButton = card.querySelector('.increase');
      const progressBar = card.querySelector('.progress-bar');
      const currentLabel = card.querySelector('.current');
      const detailLabel = card.querySelector('.detail');
      const countLabel = card.querySelector('.count');

      function getBonusAlcohol() {
        if (task.id !== 'alcohol') return 0;
        const allTasks = getStoredTasks();
        const countsNow = getWeekDayCounts(weekKey, todayKey);
        return allTasks.reduce((bonus, sourceTask) => {
          if (!sourceTask.bonusAlcohol || sourceTask.id === 'alcohol') {
            return bonus;
          }
          const sourceCount = countsNow[sourceTask.id] || 0;
          const extra = Math.max(0, sourceCount - sourceTask.target);
          const increments = Math.floor(extra / sourceTask.step);
          return bonus + increments * sourceTask.bonusAlcohol;
        }, 0);
      }

      function renderCard(value) {
        const safeValue = clamp(value, 0, task.type === 'min' ? Math.max(task.target, value) : Math.max(task.target, value));
        const effectiveTarget = task.id === 'alcohol' ? task.target + getBonusAlcohol() : task.target;
        const progress = task.type === 'min'
          ? clamp((safeValue / task.target) * 100, 0, 100)
          : clamp((1 - safeValue / effectiveTarget) * 100, 0, 100);

        progressBar.style.width = `${progress}%`;
        countLabel.textContent = `${safeValue} ${task.unitLabel}`;

        if (task.type === 'min') {
          currentLabel.textContent = safeValue >= task.target ? 'Goal reached' : 'Progress';
          detailLabel.textContent = safeValue >= task.target
            ? 'Nice work — goal complete!'
            : `${task.target - safeValue} ${task.unitLabel} to go`;
        } else {
          currentLabel.textContent = safeValue <= effectiveTarget ? 'Under limit' : 'Over limit';
          detailLabel.textContent = safeValue <= effectiveTarget
            ? `${effectiveTarget - safeValue} ${task.unitLabel} remaining${task.id === 'alcohol' && effectiveTarget > task.target ? ` (${effectiveTarget - task.target} bonus units)` : ''}`
            : `${safeValue - effectiveTarget} over the limit`;
        }

        if (task.type === 'max' && safeValue > effectiveTarget) {
          progressBar.style.background = 'linear-gradient(90deg, rgba(255,136,136,0.95), rgba(255,96,96,0.95))';
        } else {
          progressBar.style.background = 'linear-gradient(90deg, rgba(124,226,255,0.95), rgba(141,123,255,0.9))';
        }
      }

      function updateCount(value) {
        const safeValue = clamp(value, 0, task.type === 'min' ? Math.max(task.target, value) : Math.max(task.target, value));
        const todayKey = getDateKey(new Date());
        setWeekDayCount(weekKey, todayKey, task.id, safeValue);
        renderTasksForWeek(weekKey);
      }

      decreaseButton.addEventListener('click', () => {
        const current = typeof getWeekDayCounts(weekKey, todayKey)[task.id] === 'number' ? getWeekDayCounts(weekKey, todayKey)[task.id] : 0;
        updateCount(current - task.step);
      });

      increaseButton.addEventListener('click', () => {
        const current = typeof getWeekDayCounts(weekKey, todayKey)[task.id] === 'number' ? getWeekDayCounts(weekKey, todayKey)[task.id] : 0;
        updateCount(current + task.step);
      });

      renderCard(initialValue);
      return card;
    }

    function renderTasksForWeek(weekKey) {
      taskContainer.innerHTML = '';
      const tasks = getStoredTasks();
      tasks.forEach(task => taskContainer.appendChild(createTaskCard(task, weekKey)));
    }

    function buildWeekPicker() {
      const weekStarts = generateWeekOptions();
      weekStarts.forEach((weekStart, index) => {
        const option = document.createElement('option');
        const weekKey = getWeekKey(weekStart);
        option.value = weekKey;
        option.textContent = `Week ${index + 1}: ${formatWeekRange(weekStart)}`;
        weekPicker.append(option);
      });

      const storedWeek = localStorage.getItem(selectedWeekKey);
      const defaultWeekKey = storedWeek || getWeekKey(weekStarts[0]);
      weekPicker.value = defaultWeekKey;
      renderTasksForWeek(weekPicker.value);
    }

    weekPicker.addEventListener('change', () => {
      const selectedWeek = weekPicker.value;
      localStorage.setItem(selectedWeekKey, selectedWeek);
      renderTasksForWeek(selectedWeek);
    });

    const resetButton = document.getElementById('resetProgress');
    const exportButton = document.getElementById('exportData');
    const importButton = document.getElementById('importData');
    const importFile = document.getElementById('importFile');

    function exportAllData() {
      const exportObject = {
        taskDefinitions: getStoredTasks(),
        progress: getPersistedData(),
        selectedWeek: localStorage.getItem(selectedWeekKey) || null
      };
      const blob = new Blob([JSON.stringify(exportObject, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'weekly-task-tracker-data.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showStatusMessage('Data exported to JSON file.');
    }

    function importAllData(file) {
      const reader = new FileReader();
      reader.onload = event => {
        try {
          const imported = JSON.parse(event.target.result);
          if (imported) {
            if (Array.isArray(imported.taskDefinitions)) {
              localStorage.setItem(taskDefKey, JSON.stringify(imported.taskDefinitions));
            }
            if (imported.progress && typeof imported.progress === 'object') {
              localStorage.setItem(storageKey, JSON.stringify(imported.progress));
            }
            if (typeof imported.selectedWeek === 'string') {
              localStorage.setItem(selectedWeekKey, imported.selectedWeek);
            }
            renderTasksForWeek(weekPicker.value);
            showStatusMessage('Data imported successfully.');
          }
        } catch (err) {
          showStatusMessage('Could not import data: invalid JSON.');
        }
      };
      reader.readAsText(file);
    }

    const clearButton = document.getElementById('clearStorage');

    if (resetButton) {
      resetButton.addEventListener('click', resetCurrentDay);
    }
    if (exportButton) {
      exportButton.addEventListener('click', exportAllData);
    }
    if (importButton && importFile) {
      importButton.addEventListener('click', () => importFile.click());
      importFile.addEventListener('change', event => {
        const file = event.target.files[0];
        if (file) {
          importAllData(file);
        }
        importFile.value = '';
      });
    }
    if (clearButton) {
      clearButton.addEventListener('click', () => {
        const confirmed = window.confirm('Delete all locally saved task data? This cannot be undone.');
        if (!confirmed) return;
        localStorage.clear();
        showStatusMessage('All local data cleared. Reloading page...');
        setTimeout(() => window.location.reload(), 500);
      });
    }

    buildWeekPicker();
  </script>
</body>
</html>
